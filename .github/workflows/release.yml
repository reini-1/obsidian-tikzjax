name: Release Obsidian plugin

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

env:
    PLUGIN_NAME: obsidian-tikzjax

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Verify build
              run: |
                  echo "📁 Build contents:"
                  ls -la build/
                  if [ ! -f "build/main.js" ]; then exit 1; fi
                  if [ ! -f "build/manifest.json" ]; then exit 1; fi
                  if [ ! -f "build/tikzjax.js" ]; then exit 1; fi
                  echo "✅ All files present"

            - name: Package plugin
              run: |
                  mkdir -p "${{ env.PLUGIN_NAME }}"
                  cp build/* "${{ env.PLUGIN_NAME }}/"
                  zip -r "${{ env.PLUGIN_NAME }}.zip" "${{ env.PLUGIN_NAME }}"

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  name: ${{ github.ref_name }}
                  draft: false
                  prerelease: false
                  files: |
                      build/main.js
                      build/manifest.json
                      build/styles.css
                      build/tikzjax.js
                      ${{ env.PLUGIN_NAME }}.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
